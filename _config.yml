# GitHub Pages Build Config
# Disable Jekyll processing, serve static files only

exclude:
  - venv/
  - __pycache__/
  - .git/
  - .gitignore
  - requirements.txt
  - app.py
  - scraper.py
  - color_analysis.py
  - utils.py
  - config.py
  - test_api.py
  - .env
  - *.pyc
  - node_modules/
  - README.md

keep_files:
  - public/index.html
  - universal-api-client.html

theme: jekyll-theme-primer
